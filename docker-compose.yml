version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tasks-postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: tasks_db
    ports:
      - "5432:5432"

  api:
    build: .
    container_name: tasks-nestjs-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      # Nota que aquí nos conectamos al host "db" (el contenedor de arriba), no a localhost
      DATABASE_URL: "postgresql://postgres:admin@db:5432/tasks_db?schema=public"
    depends_on:
      - db
